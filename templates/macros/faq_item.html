{% macro faq_item(item, open=false) %}
<div class="med-faq__item {% if open %}is-open{% endif %}" data-faq-item>
  <button
    class="med-faq__question"
    type="button"
    aria-expanded="{{ 'true' if open else 'false' }}"
    aria-controls="faq-{{ item.id }}"
    data-faq-trigger
  >
    <span data-i18n="landing.faq.{{ item.id }}.question">{{ item.question }}</span>
    <i class="bi bi-chevron-down med-faq__chevron" aria-hidden="true"></i>
  </button>
  <div class="med-faq__answer" id="faq-{{ item.id }}" {% if not open %}hidden{% endif %}>
    <p data-i18n="landing.faq.{{ item.id }}.answer">{{ item.answer }}</p>
  </div>
</div>
{% endmacro %}
