{# Compact language switcher - globe icon + EN/SW #}
<div class="med-lang" data-lang-widget role="group" data-i18n-aria="language.ariaGroup">
  <i class="bi bi-globe2 med-lang__icon" aria-hidden="true"></i>
  <button type="button" class="med-lang__code" data-lang-switch="en" aria-pressed="true">EN</button>
  <span class="med-lang__sep" aria-hidden="true">/</span>
  <button type="button" class="med-lang__code" data-lang-switch="sw" aria-pressed="false">SW</button>
</div>
