<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page_description | default(brand_name ~ ' - Modern healthcare appointment platform') }}">
  <title>{{ page_title | default(brand_name) }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}?v={{ static_v }}">
  {% block styles %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}

  <script type="module" src="{{ url_for('static', path='js/core/app.js') }}?v={{ static_v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
