{% extends "layouts/public.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', path='css/pages/services.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='css/pages/faq.css') }}">
{% endblock %}

{% block content %}
<section class="catalog-page faq-page">
  <div class="med-container">
    <header class="catalog-page__hero" data-reveal>
      <a href="/" class="catalog-page__back"><i class="bi bi-arrow-left"></i> <span data-i18n="navigation.backToHome">Back to home</span></a>
      <span class="med-section-header__badge" data-i18n="landing.faqIntro.badge">FAQ</span>
      <h1 class="catalog-page__title" data-i18n="landing.faqIntro.title">{{ faq_intro.title }}</h1>
      <p class="catalog-page__subtitle" data-i18n="landing.faqIntro.subtitle">{{ faq_intro.subtitle }}</p>
    </header>

    {% include "sections/landing/faq.html" %}
  </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', path='js/pages/faq.js') }}"></script>
{% endblock %}
